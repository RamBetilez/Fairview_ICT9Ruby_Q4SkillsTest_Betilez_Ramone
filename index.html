<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
    
    <style>
        body {
            font-family: 'Poppins', sans-serif; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #0055ff;
        }

        .login-container {
            background: #fff;
            padding: 20px 30px;
            border-radius: 12px; 
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 300px;
        }

        .login-container img {
            width: 80px;
            margin-bottom: 10px; 
            max-width: 100%; 
            height: auto; 
        }

        .login-container h2 {
            font-size: 24px; 
            font-family: Poppins; 
            margin-top: 10px; 
            margin-bottom: 20px; 
            color: #333;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-family: Poppins; 
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }

        .input-group input {
            width: calc(100% - 22px); 
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 12px; 
            font-size: 14px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            justify-content: flex-start;
            font-size: 13px;
            color: #555;
        }

        .remember-me input[type="checkbox"] {
            margin-right: 8px;
            width: 16px;
            height: 16px;
            accent-color: #007bff; 
        }

        .remember-me label {
            margin-bottom: 0; 
        }

        .button-group {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .button-group button {
            width: 48%;
            padding: 10px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500; 
            cursor: pointer;
            transition: background-color 0.3s ease; 
        }

        .button-group .login-btn {
            background-color: #007bff;
            color: #fff;
        }

        .button-group .login-btn:hover {
            background-color: #0056b3;
        }

        .button-group .cancel-btn {
            background-color: #e0e0e0; 
            color: #333;
        }

        .button-group .cancel-btn:hover {
            background-color: #c9c9c9;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <img src="https://upload.wikimedia.org/wikipedia/en/thumb/6/6c/Ateneo_de_Manila_University_seal.svg/1280px-Ateneo_de_Manila_University_seal.svg.png" alt="Logo">
        <h2>Login</h2>
        <div class="input-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Enter here">
        </div>
        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="********">
        </div>
        <div class="remember-me">
            <input type="checkbox" id="stay-logged-in">
            <label for="stay-logged-in">Stay logged in</label>
        </div>
        <div class="button-group">
            <button class="login-btn">Login</button>
            <button class="cancel-btn">Cancel</button>
        </div>
    </div>

    <script>
        document.querySelector('.login-btn').addEventListener('click', () => {
            window.location.href = 'notebook.html';
        });
    </script>
</body>
</html>
